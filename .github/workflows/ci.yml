name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff black

      - name: Lint backend (ruff)
        run: ruff check backend/

      - name: Format backend (black)
        run: black --check backend/


  quality-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install prettier
        run: npm install -g prettier

      - name: Format frontend
        run: prettier --check "frontend/**/*.{js,css,html}"


  dockerfiles:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Hadolint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Hadolint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile


  build-images:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t task-backend ./backend

      - name: Build frontend image
        run: docker build -t task-frontend ./frontend
