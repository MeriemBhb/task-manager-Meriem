name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend tools
        run: |
          pip install -r backend/requirements.txt
          pip install ruff black

      - name: Lint backend (ruff)
        run: ruff check backend/

      - name: Format backend (black)
        run: black --check backend/

  quality-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install prettier
        run: npm install -g prettier

      - name: Format frontend (prettier)
        run: prettier --check "frontend/**/*.{js,css,html}"

  dockerfiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: error

      - name: Hadolint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

  build-images:
    needs: [quality-backend, quality-frontend, dockerfiles]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t task-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t task-frontend:ci ./frontend

  scan-images:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t task-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t task-frontend:ci ./frontend

      - name: Trivy scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: task-backend:ci
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Trivy scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: task-frontend:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
